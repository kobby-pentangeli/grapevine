# cargo-audit configuration.
#
# RUSTSEC-2025-0141: bincode 2.x is flagged unmaintained (2025-12-16). This is an
# informational warning, not a vulnerability. bincode is grapevine's wire
# serializer, so migrating off it is a breaking wire-format change that is out of
# scope for the v1.1.0 release; it is tracked as a deferred migration in a future release.
# A genuine bincode *vulnerability* would carry a different advisory ID and is
# intentionally not ignored here.
[advisories]
ignore = ["RUSTSEC-2025-0141"]
